<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>player_whitehair_girl 序列帧测试场景</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #202327;
      --panel: #2f3431;
      --line: #687066;
      --text: #f5f0e8;
      --muted: #c5c0b6;
      --accent: #e0b15d;
      --danger: #e24c4c;
      --bounds: #4f8ee8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
    }

    aside {
      padding: 18px;
      background: var(--panel);
      border-right: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 18px;
      font-size: 20px;
      font-weight: 650;
      letter-spacing: 0;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      color: var(--muted);
      font-size: 13px;
    }

    select,
    button,
    input[type="range"] {
      width: 100%;
    }

    select,
    button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #f5f0e8;
      color: #202327;
      font: inherit;
    }

    button {
      cursor: pointer;
      margin-top: 8px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .meta {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    code {
      color: var(--accent);
      word-break: break-all;
    }

    section {
      min-width: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .stage-wrap {
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .stage {
      position: relative;
      width: 512px;
      height: 512px;
      max-width: calc(100vw - 368px);
      max-height: calc(100vh - 72px);
      aspect-ratio: 1;
      background:
        linear-gradient(rgba(255,255,255,.08), rgba(255,255,255,.08)),
        repeating-conic-gradient(#dcdcdc 0 25%, #ffffff 0 50%) 0 / 32px 32px;
      box-shadow: 0 0 0 1px var(--line);
      overflow: hidden;
    }

    .sprite {
      width: 100%;
      height: 100%;
      background-repeat: no-repeat;
      background-size: auto 100%;
      image-rendering: auto;
    }

    .anchor-line {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% * 234 / 256);
      height: 1px;
      background: var(--danger);
      pointer-events: none;
    }

    .center-line {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 1px;
      background: rgba(226, 76, 76, .45);
      pointer-events: none;
    }

    .bounds {
      position: absolute;
      inset: 0;
      border: 1px dashed var(--bounds);
      pointer-events: none;
    }

    .caption {
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 760px) {
      main {
        grid-template-columns: 1fr;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .stage {
        width: min(512px, calc(100vw - 32px));
        height: auto;
        max-width: calc(100vw - 32px);
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <aside>
      <h1>序列帧测试场景</h1>

      <label for="action">动作</label>
      <select id="action">
        <option value="idle">idle</option>
        <option value="walk">walk</option>
      </select>

      <label for="direction">方向</label>
      <select id="direction">
        <option value="right">right</option>
        <option value="left">left</option>
      </select>

      <label for="fps">播放速度：<span id="fpsValue">6</span> FPS</label>
      <input id="fps" type="range" min="1" max="16" value="6">

      <div class="button-row">
        <button id="playPause" type="button">暂停</button>
        <button id="step" type="button">单帧</button>
      </div>

      <div class="button-row">
        <button id="prev" type="button">上一帧</button>
        <button id="reset" type="button">归零</button>
      </div>

      <div class="meta">
        <div>角色：<code>player_whitehair_girl</code></div>
        <div>方向：<code id="directionText">right</code></div>
        <div>当前帧：<code id="frameText">0 / 3</code></div>
        <div>帧尺寸：<code>256×256</code></div>
        <div>红线：脚底锚点参考线</div>
        <div>蓝框：单帧边界</div>
        <div>资源目录：<code>frames/&lt;action&gt;/right</code></div>
      </div>
    </aside>

    <section>
      <div class="stage-wrap">
        <div class="stage">
          <div id="sprite" class="sprite" role="img" aria-label="当前序列帧"></div>
          <div class="anchor-line"></div>
          <div class="center-line"></div>
          <div class="bounds"></div>
        </div>
        <div class="caption" id="caption">idle_right</div>
      </div>
    </section>
  </main>

  <script>
    const animations = {
      idle_right: {
        fps: 6,
        loop: true,
        sheet: "sheets/player_whitehair_girl_idle_lr.png",
        row: 0,
        frames: [
          "frames/idle/right/player_whitehair_girl_idle_right_000.png",
          "frames/idle/right/player_whitehair_girl_idle_right_001.png",
          "frames/idle/right/player_whitehair_girl_idle_right_002.png",
          "frames/idle/right/player_whitehair_girl_idle_right_003.png"
        ]
      },
      idle_left: {
        fps: 6,
        loop: true,
        sheet: "sheets/player_whitehair_girl_idle_lr.png",
        row: 1,
        frames: [
          "frames/idle/left/player_whitehair_girl_idle_left_000.png",
          "frames/idle/left/player_whitehair_girl_idle_left_001.png",
          "frames/idle/left/player_whitehair_girl_idle_left_002.png",
          "frames/idle/left/player_whitehair_girl_idle_left_003.png"
        ]
      },
      walk_right: {
        fps: 8,
        loop: true,
        sheet: "sheets/player_whitehair_girl_walk_lr.png",
        row: 0,
        frames: [
          "frames/walk/right/player_whitehair_girl_walk_right_000.png",
          "frames/walk/right/player_whitehair_girl_walk_right_001.png",
          "frames/walk/right/player_whitehair_girl_walk_right_002.png",
          "frames/walk/right/player_whitehair_girl_walk_right_003.png"
        ]
      },
      walk_left: {
        fps: 8,
        loop: true,
        sheet: "sheets/player_whitehair_girl_walk_lr.png",
        row: 1,
        frames: [
          "frames/walk/left/player_whitehair_girl_walk_left_000.png",
          "frames/walk/left/player_whitehair_girl_walk_left_001.png",
          "frames/walk/left/player_whitehair_girl_walk_left_002.png",
          "frames/walk/left/player_whitehair_girl_walk_left_003.png"
        ]
      }
    };

    const action = document.getElementById("action");
    const direction = document.getElementById("direction");
    const fps = document.getElementById("fps");
    const fpsValue = document.getElementById("fpsValue");
    const playPause = document.getElementById("playPause");
    const step = document.getElementById("step");
    const prev = document.getElementById("prev");
    const reset = document.getElementById("reset");
    const sprite = document.getElementById("sprite");
    const frameText = document.getElementById("frameText");
    const directionText = document.getElementById("directionText");
    const caption = document.getElementById("caption");

    let frameIndex = 0;
    let playing = true;
    let lastTime = 0;

    function currentAnimation() {
      return animations[`${action.value}_${direction.value}`];
    }

    function render() {
      const anim = currentAnimation();
      frameIndex = ((frameIndex % anim.frames.length) + anim.frames.length) % anim.frames.length;
      const xPosition = anim.frames.length <= 1 ? 0 : (frameIndex / (anim.frames.length - 1)) * 100;
      const yPosition = anim.row === 0 ? 0 : 100;
      sprite.style.backgroundImage = `url("${anim.sheet}")`;
      sprite.style.backgroundSize = `${anim.frames.length * 100}% 200%`;
      sprite.style.backgroundPosition = `${xPosition}% ${yPosition}%`;
      frameText.textContent = `${frameIndex} / ${anim.frames.length - 1}`;
      directionText.textContent = direction.value;
      caption.textContent = `${action.value}_${direction.value}`;
    }

    function setActionDefaults() {
      const anim = currentAnimation();
      fps.value = String(anim.fps);
      fpsValue.textContent = String(anim.fps);
      frameIndex = 0;
      render();
    }

    action.addEventListener("change", setActionDefaults);
    direction.addEventListener("change", setActionDefaults);
    fps.addEventListener("input", () => {
      fpsValue.textContent = fps.value;
    });

    playPause.addEventListener("click", () => {
      playing = !playing;
      playPause.textContent = playing ? "暂停" : "播放";
    });

    step.addEventListener("click", () => {
      playing = false;
      playPause.textContent = "播放";
      frameIndex += 1;
      render();
    });

    prev.addEventListener("click", () => {
      playing = false;
      playPause.textContent = "播放";
      frameIndex -= 1;
      render();
    });

    reset.addEventListener("click", () => {
      frameIndex = 0;
      render();
    });

    function tick(time) {
      const interval = 1000 / Number(fps.value || 1);
      if (playing && time - lastTime >= interval) {
        lastTime = time;
        frameIndex += 1;
        render();
      }
      requestAnimationFrame(tick);
    }

    setActionDefaults();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
