id: active_puncture
version: 1.0.0
display:
  name_key: gem.active_puncture.name
  description_key: gem.active_puncture.description
classification:
  tags: ["attack", "physical", "area", "pierce"]
  damage_type: physical
  damage_form: attack
cast:
  mode: attack
  target_selector: nearest_enemy
  search_range: 320
  cooldown_ms: 700
  windup_ms: 120
  recovery_ms: 80
behavior:
  template: damage_zone
  params:
    shape: rectangle
    origin_policy: caster
    facing_policy: locked_or_nearest_target
    hit_at_ms: 180
    max_targets: 3
    status_chance_scale: 1
    zone_vfx_key: skill_event.ground_spike.vfx
    length: 260
    width: 72
    angle_offset_deg: 0
    hit_at_ms: 180
    max_targets: 3
    facing_policy: locked_or_nearest_target
    status_chance_scale: 1
    max_targets: 3
hit:
  base_damage: 15
  can_crit: true
  can_apply_status: true
  damage_timing: on_damage_zone_hit
  hit_delay_ms: 180
  hit_radius: 40
  target_policy: nearest_enemy
scaling:
  additive_stats: ["damage_add_percent", "physical_damage_add_percent", "attack_speed_add_percent", "area_add_percent"]
  final_stats: ["damage_final_percent", "skill_speed_final_percent"]
  runtime_params: ["area_add_percent", "status_chance_add_percent"]
presentation:
  vfx: skill_event.ground_spike.vfx
  cast_vfx_key: skill_event.ground_spike.vfx
  hit_vfx_key: skill_event.ground_spike.vfx
  sfx: skill_event.ground_spike.sfx
  floating_text: skill_event.ground_spike.floating_text
  floating_text_style: skill_event.ground_spike.floating_text
  screen_feedback: skill_event.ground_spike.screen_feedback
  hit_stop_ms: 0
  camera_shake: 0
preview:
  show_fields: ["final_damage", "final_cooldown_ms", "damage_type", "speed_multiplier"]
