id: active_fire_bolt
version: 1.0.0
display:
  name_key: gem.active_fire_bolt.name
  description_key: gem.active_fire_bolt.description
classification:
  tags: ["spell", "fire", "projectile"]
  damage_type: fire
  damage_form: spell
cast:
  mode: spell
  target_selector: nearest_enemy
  search_range: 520
  cooldown_ms: 700
  windup_ms: 0
  recovery_ms: 0
behavior:
  template: projectile
  params:
    projectile_count: 3
    spread_angle_deg: 60
    projectile_speed: 520
    projectile_width: 56
    projectile_height: 40
    max_distance: 520
    hit_policy: first_hit
    pierce_count: 0
    collision_radius: 18
    spawn_offset:
      x: -10
      y: -20
    projectile_radius: 14
    impact_radius: 18
    max_targets: 1
    min_duration_ms: 80
    max_duration_ms: 2200
hit:
  base_damage: 12
  can_crit: true
  can_apply_status: true
  damage_timing: on_projectile_hit
  hit_delay_ms: 420
  hit_radius: 18
  target_policy: selected_target
scaling:
  additive_stats: ["damage_add_percent", "fire_damage_add_percent", "cast_speed_add_percent"]
  final_stats: ["damage_final_percent", "skill_speed_final_percent"]
  runtime_params: ["projectile_speed_add_percent", "projectile_count_add"]
presentation:
  vfx: skill_event.fire_bolt.vfx
  cast_vfx_key: skill_event.fire_bolt.vfx
  projectile_vfx_key: skill_event.fire_bolt.vfx
  hit_vfx_key: skill_event.fire_bolt.vfx
  sfx: skill_event.fire_bolt.sfx
  floating_text: skill_event.fire_bolt.floating_text
  floating_text_style: skill_event.fire_bolt.floating_text
  screen_feedback: skill_event.fire_bolt.screen_feedback
  hit_stop_ms: 0
  camera_shake: 0
preview:
  show_fields: ["final_damage", "final_cooldown_ms", "projectile_count", "speed_multiplier"]
