    tick_marker_id: lava_orb_tick
    spawn_vfx_key: skill_event.lava_orb.spawn
    tick_vfx_key: skill_event.lava_orb.tick
modules: [{"id": "lava_orbit", "type": "orbit_emitter", "params": {"orbit_center_policy": "caster", "duration_ms": 3200, "tick_interval_ms": 380, "orbit_radius": 150, "orbit_speed_deg_per_sec": 60, "orb_count": 1, "start_angle_deg": 0, "tick_marker_id": "lava_orb_tick", "spawn_vfx_key": "skill_event.lava_orb.spawn", "tick_vfx_key": "skill_event.lava_orb.tick"}}, {"id": "lava_orb_damage_zone", "type": "damage_zone", "trigger": {"trigger_marker_id": "lava_orb_tick", "trigger_delay_ms": 0}, "params": {"shape": "circle", "origin_policy": "trigger_position", "facing_policy": "none", "radius": 68, "hit_at_ms": 0, "max_targets": 8, "status_chance_scale": 1, "vfx_key": "skill_event.lava_orb.hit", "ring_width": 28}}]
