id: active_lightning_chain
version: 1.0.0
display:
  name_key: gem.active_lightning_chain.name
  description_key: gem.active_lightning_chain.description
classification:
  tags: ["spell", "lightning", "chain"]
  damage_type: lightning
  damage_form: spell
cast:
  mode: spell
  target_selector: nearest_enemy
  search_range: 520
  cooldown_ms: 1000
  windup_ms: 80
  recovery_ms: 100
behavior:
  template: chain
  params:
    chain_count: 4
    chain_radius: 180
    chain_delay_ms: 120
    damage_falloff_per_chain: 0.18
    target_policy: nearest_not_hit
    allow_repeat_target: false
    max_targets: 4
    segment_vfx_key: skill_event.lightning_chain.vfx
hit:
  base_damage: 10
  can_crit: true
  can_apply_status: true
  damage_timing: on_chain_hit
  hit_delay_ms: 0
  hit_radius: 180
  target_policy: nearest_enemy
scaling:
  additive_stats: ["damage_add_percent", "lightning_damage_add_percent", "cast_speed_add_percent", "area_add_percent"]
  final_stats: ["damage_final_percent", "skill_speed_final_percent"]
  runtime_params: ["area_add_percent", "status_chance_add_percent"]
presentation:
  vfx: skill_event.lightning_chain.vfx
  cast_vfx_key: skill_event.lightning_chain.vfx
  hit_vfx_key: skill_event.lightning_chain.vfx
  sfx: skill_event.lightning_chain.sfx
  floating_text: skill_event.lightning_chain.floating_text
  floating_text_style: skill_event.lightning_chain.floating_text
  screen_feedback: skill_event.lightning_chain.screen_feedback
  hit_stop_ms: 0
  camera_shake: 0
preview:
  show_fields: ["final_damage", "final_cooldown_ms", "damage_type", "speed_multiplier"]
