id: active_ice_shards
version: 1.0.0
display:
  name_key: gem.active_ice_shards.name
  description_key: gem.active_ice_shards.description
classification:
  tags: ["spell", "cold", "projectile"]
  damage_type: cold
  damage_form: spell
cast:
  mode: spell
  target_selector: nearest_enemy
  search_range: 380
  cooldown_ms: 820
  windup_ms: 0
  recovery_ms: 0
behavior:
  template: projectile
  params:
    projectile_count: 3
    spread_angle_deg: 70
    angle_step: 35
    projectile_speed: 460
    projectile_width: 44
    projectile_height: 18
    max_distance: 400
    hit_policy: first_hit
    collision_radius: 24
hit:
  base_damage: 8
  can_crit: true
  can_apply_status: true
  damage_timing: on_projectile_hit
  hit_delay_ms: 0
  hit_radius: 18
  target_policy: nearest_enemy
scaling:
  additive_stats: ["damage_add_percent", "cold_damage_add_percent", "cast_speed_add_percent"]
  final_stats: ["damage_final_percent", "skill_speed_final_percent"]
  runtime_params: ["projectile_speed_add_percent", "projectile_count_add"]
presentation:
  vfx: skill_event.ice_shards.vfx
  cast_vfx_key: skill_event.ice_shards.vfx
  projectile_vfx_key: skill_event.ice_shards.vfx
  hit_vfx_key: skill_event.ice_shards.vfx
  sfx: skill_event.ice_shards.sfx
  floating_text: skill_event.ice_shards.floating_text
  floating_text_style: skill_event.ice_shards.floating_text
  screen_feedback: skill_event.ice_shards.screen_feedback
  hit_stop_ms: 0
  camera_shake: 0
preview:
  show_fields: ["final_damage", "final_cooldown_ms", "projectile_count", "speed_multiplier"]
