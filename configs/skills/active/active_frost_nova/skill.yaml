id: active_frost_nova
version: 1.0.0
display:
  name_key: gem.active_frost_nova.name
  description_key: gem.active_frost_nova.description
classification:
  tags: ["spell", "cold", "area", "nova"]
  damage_type: cold
  damage_form: spell
cast:
  mode: spell
  target_selector: self
  search_range: 430
  cooldown_ms: 1200
  windup_ms: 0
  recovery_ms: 0
behavior:
  template: player_nova
  params:
    radius: 430
    expand_duration_ms: 520
    hit_at_ms: 260
    max_targets: 8
    center_policy: player_center
    damage_falloff_by_distance: none
    ring_width: 64
    status_chance_scale: 1
hit:
  base_damage: 14
  can_crit: true
  can_apply_status: true
  damage_timing: on_area_hit
  hit_delay_ms: 260
  hit_radius: 430
  target_policy: nearest_enemy
scaling:
  additive_stats: ["damage_add_percent", "cold_damage_add_percent", "cast_speed_add_percent", "area_add_percent"]
  final_stats: ["damage_final_percent", "skill_speed_final_percent"]
  runtime_params: ["area_add_percent", "status_chance_add_percent"]
presentation:
  vfx: skill_event.frost_nova.vfx
  cast_vfx_key: skill_event.frost_nova.vfx
  hit_vfx_key: skill_event.frost_nova.vfx
  sfx: skill_event.frost_nova.sfx
  floating_text: skill_event.frost_nova.floating_text
  floating_text_style: skill_event.frost_nova.floating_text
  screen_feedback: skill_event.frost_nova.screen_feedback
  hit_stop_ms: 0
  camera_shake: 0
preview:
  show_fields: ["final_damage", "final_cooldown_ms", "damage_type", "speed_multiplier"]
