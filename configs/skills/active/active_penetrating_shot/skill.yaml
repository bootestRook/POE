id: active_penetrating_shot
version: 1.0.0
display:
  name_key: gem.active_penetrating_shot.name
  description_key: gem.active_penetrating_shot.description
classification:
  tags: ["attack", "physical", "ranged", "projectile", "pierce"]
  damage_type: physical
  damage_form: attack
cast:
  mode: attack
  target_selector: nearest_enemy
  search_range: 680
  cooldown_ms: 850
  windup_ms: 0
  recovery_ms: 0
behavior:
  template: projectile
  params:
    projectile_count: 1
    burst_interval_ms: 0
    spread_angle_deg: 0
    angle_step: 0
    projectile_speed: 760
    projectile_width: 64
    projectile_height: 18
    max_distance: 680
    hit_policy: pierce
    pierce_count: 3
    collision_radius: 16
    spawn_offset:
      x: -8
      y: -18
    projectile_radius: 10
    impact_radius: 14
    max_targets: 4
    min_duration_ms: 80
    max_duration_ms: 2200
hit:
  base_damage: 13
  can_crit: true
  can_apply_status: false
  damage_timing: on_projectile_hit
  hit_delay_ms: 0
  hit_radius: 16
  target_policy: selected_target
scaling:
  additive_stats: ["damage_add_percent", "physical_damage_add_percent", "attack_speed_add_percent", "projectile_speed_add_percent"]
  final_stats: ["damage_final_percent", "skill_speed_final_percent"]
  runtime_params: ["projectile_speed_add_percent", "projectile_count_add"]
presentation:
  vfx: skill_event.penetrating_shot.vfx
  cast_vfx_key: skill_event.penetrating_shot.vfx
  projectile_vfx_key: skill_event.penetrating_shot.vfx
  hit_vfx_key: skill_event.penetrating_shot.vfx
  sfx: skill_event.penetrating_shot.sfx
  floating_text: skill_event.penetrating_shot.floating_text
  floating_text_style: skill_event.penetrating_shot.floating_text
  screen_feedback: skill_event.penetrating_shot.screen_feedback
  hit_stop_ms: 0
  camera_shake: 0
preview:
  show_fields: ["final_damage", "final_cooldown_ms", "projectile_count", "speed_multiplier"]
